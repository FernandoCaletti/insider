[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.api"

[deploy]
startCommand = "uvicorn api.app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[cron]
schedule = "0 3 */3 * *"
command = "python -m pipeline.src.main"
